<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PYRAMID RALLY — Co-driver</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{ --green:#2fae4e; --orange:#ff8c2e; --ink:#f5f2e8; --bg:#1c211b; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Rubik',sans-serif;user-select:none}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:14px}
  .hidden{display:none !important}
  h1{font-family:'Archivo Black',sans-serif;font-size:clamp(20px,6vw,30px);letter-spacing:1px;color:var(--green);text-transform:lowercase}
  .sub{font-size:13px;color:#9aa691;letter-spacing:2px;text-transform:uppercase;font-weight:700}
  input{background:#12160f;border:2px solid #3a4434;color:var(--ink);font-family:'Archivo Black',sans-serif;
    font-size:20px;padding:14px;width:min(260px,80vw);text-align:center;border-radius:10px;outline:none;text-transform:uppercase;letter-spacing:6px}
  input:focus{border-color:var(--green)}
  .bigbtn{font-family:'Archivo Black',sans-serif;font-size:15px;padding:15px 34px;background:var(--green);color:#fff;border:none;
    border-radius:10px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
  .err{color:#ff6b5e;font-size:13px;min-height:18px}

  /* pace notes view */
  #notes{position:fixed;inset:0;display:flex;flex-direction:column;padding:16px}
  #drvBar{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:14px;color:#c9d2be;margin-bottom:4px}
  #drvBar .status{font-size:11px;color:#9aa691;text-transform:uppercase;letter-spacing:1px}
  #progressWrap{height:5px;background:#12160f;border-radius:3px;overflow:hidden;margin-bottom:12px}
  #progressBar{height:100%;width:0%;background:linear-gradient(90deg,var(--green),#9cff57)}
  #callNow{flex:0 0 auto;text-align:center;padding:26px 10px;border:3px solid var(--orange);border-radius:18px;background:#232a21}
  #callNow .dist{font-size:15px;color:var(--orange);font-weight:800;letter-spacing:1px}
  #callNow .txt{font-family:'Archivo Black',sans-serif;font-size:clamp(30px,9vw,54px);line-height:1.15;text-transform:uppercase;margin-top:4px}
  #callNext{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .nrow{display:flex;justify-content:space-between;background:#20261e;border-radius:12px;padding:12px 16px;font-weight:800}
  .nrow .d{color:#9aa691}
  #mapWrap{margin-top:auto;display:flex;justify-content:center;padding-top:14px}
  #map{width:170px;height:170px;background:#12160f;border:2px solid #3a4434;border-radius:14px}
  .hint{font-size:11px;color:#77836d;text-align:center;margin-top:8px}
</style>
</head>
<body>

<div class="screen" id="join">
  <h1>pyramid rally</h1>
  <div class="sub">Co-driver · pace notes</div>
  <div style="font-size:13px;color:#9aa691;max-width:300px">Enter the crew code from your driver's menu. You'll see their pace notes live — read them out loud!</div>
  <input id="code" maxlength="4" placeholder="CODE" autocomplete="off">
  <div class="err" id="err"></div>
  <button class="bigbtn" id="go">CALL THE STAGE</button>
</div>

<div id="notes" class="hidden">
  <div id="drvBar"><span id="drvName">…</span><span class="status" id="drvStatus">waiting</span></div>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="callNow"><div class="dist" id="nowDist"></div><div class="txt" id="nowTxt">STAND BY</div></div>
  <div id="callNext"></div>
  <div id="mapWrap"><canvas id="map" width="340" height="340"></canvas></div>
  <div class="hint">Talk to your driver in person or on a call — you're the voice, they're the wheels.</div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  // ===== identical daily track generation (keep in sync with index.html) =====
  const dateStr = new Date().toISOString().slice(0, 10);
  function sha256Words(str){
    const K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
               0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
               0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
               0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
               0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
               0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
               0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
               0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    const bytes = [];
    for (let i = 0; i < str.length; i++){
      let c = str.charCodeAt(i);
      if (c < 128) bytes.push(c);
      else if (c < 2048){ bytes.push(192 | (c >> 6), 128 | (c & 63)); }
      else { bytes.push(224 | (c >> 12), 128 | ((c >> 6) & 63), 128 | (c & 63)); }
    }
    const bitLen = bytes.length * 8;
    bytes.push(0x80);
    while (bytes.length % 64 !== 56) bytes.push(0);
    for (let i = 7; i >= 0; i--) bytes.push(Math.floor(bitLen / Math.pow(2, i * 8)) & 255);
    const rot = (v, n) => (v >>> n) | (v << (32 - n));
    const w = new Array(64);
    for (let off = 0; off < bytes.length; off += 64){
      for (let i = 0; i < 16; i++)
        w[i] = (bytes[off+i*4] << 24) | (bytes[off+i*4+1] << 16) | (bytes[off+i*4+2] << 8) | bytes[off+i*4+3];
      for (let i = 16; i < 64; i++){
        const s0 = rot(w[i-15], 7) ^ rot(w[i-15], 18) ^ (w[i-15] >>> 3);
        const s1 = rot(w[i-2], 17) ^ rot(w[i-2], 19) ^ (w[i-2] >>> 10);
        w[i] = (w[i-16] + s0 + w[i-7] + s1) | 0;
      }
      let a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];
      for (let i = 0; i < 64; i++){
        const S1 = rot(e, 6) ^ rot(e, 11) ^ rot(e, 25);
        const ch = (e & f) ^ (~e & g);
        const t1 = (h + S1 + ch + K[i] + w[i]) | 0;
        const S0 = rot(a, 2) ^ rot(a, 13) ^ rot(a, 22);
        const mj = (a & b) ^ (a & c) ^ (b & c);
        const t2 = (S0 + mj) | 0;
        h = g; g = f; f = e; e = (d + t1) | 0; d = c; c = b; b = a; a = (t1 + t2) | 0;
      }
      H = [(H[0]+a)|0,(H[1]+b)|0,(H[2]+c)|0,(H[3]+d)|0,(H[4]+e)|0,(H[5]+f)|0,(H[6]+g)|0,(H[7]+h)|0];
    }
    return H.map(v => v >>> 0);
  }
  function mulberry32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
  const SW = sha256Words('pyramid-' + dateStr); // MUST match index.html word mapping
  const STEP = 24, NPTS = 600, START_I = 26, FINISH_I = NPTS - 10;
  let pts = [], widths = [];
  {
    // deterministic retry — MUST stay identical to index.html's generator
    function attemptGen(s2){
      const P = [], W = [];
      const r = mulberry32(s2);
      const grid = new Map();
      let x = 0, y = 0, h = -Math.PI / 2;
      let turn = 0, segLeft = 0, wTarget = 110, w = 120;
      for (let i = 0; i < NPTS; i++){
        P.push([x, y]); W.push(w);
        const key = Math.round(x / 120) + ':' + Math.round(y / 120);
        if (!grid.has(key)) grid.set(key, i);
        if (segLeft-- <= 0){
          segLeft = 10 + Math.floor(r() * 22);
          const roll = r(); const dir = r() < 0.5 ? -1 : 1;
          if (roll < 0.18) turn = 0;
          else if (roll < 0.40) turn = dir * 0.035;
          else if (roll < 0.62) turn = dir * 0.075;
          else if (roll < 0.84) turn = dir * 0.14;
          else { turn = dir * 0.21; segLeft += 10; }
          {
            const lane = r();
            wTarget = lane < 0.22 ? 46 + r() * 12
                    : lane < 0.68 ? 80 + r() * 30
                    : 128 + r() * 24;
          }
        }
        let avoid = 0;
        for (const look of [220, 400, 600, 820]) for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++){
          const k = (Math.round((x + Math.cos(h) * look) / 120) + dx) + ':' + (Math.round((y + Math.sin(h) * look) / 120) + dy);
          const old = grid.get(k);
          if (old !== undefined && i - old > 35) avoid = 1;
        }
        const north = -Math.PI / 2;
        let dh = turn;
        if (avoid) dh += (north - h) * 0.62;
        h += dh;
        let rel = h - north;
        while (rel > Math.PI) rel -= 2 * Math.PI;
        while (rel < -Math.PI) rel += 2 * Math.PI;
        rel = Math.max(-2.0, Math.min(2.0, rel));
        h = north + rel;
        w += (wTarget - w) * 0.12;
        x += Math.cos(h) * STEP;
        y += Math.sin(h) * STEP;
      }
      let clear = 1e9;
      for (let i = 0; i < NPTS; i += 4) for (let j = i + 70; j < NPTS; j += 4){
        const dd = Math.hypot(P[i][0] - P[j][0], P[i][1] - P[j][1]) - (W[i] + W[j]);
        if (dd < clear) clear = dd;
      }
      return { P, W, clear };
    }
    let best = null;
    for (let a = 0; a < 8; a++){
      const g = attemptGen((SW[0] + a * 0x51ab) >>> 0);
      if (!best || g.clear > best.clear) best = g;
      if (g.clear >= 12) { best = g; break; }
    }
    pts = best.P; widths = best.W;
    for (let i = 0; i < START_I + 8; i++) widths[i] = 135;
  }
  // features for the notes (same seeds as the game)
  const ramps = [], bridges = [], stones = [];
  {
    const r = mulberry32(SW[2]);
    for (let b = 0; b < 2; b++){
      const s = Math.floor(START_I + 60 + r() * (FINISH_I - START_I - 170));
      bridges.push([s, s + 26 + Math.floor(r() * 14)]);
    }
    bridges.sort((a, b) => a[0] - b[0]);
    if (bridges[1][0] < bridges[0][1] + 30){
      const len = bridges[1][1] - bridges[1][0];
      bridges[1][0] = bridges[0][1] + 40;
      bridges[1][1] = bridges[1][0] + len;
      if (bridges[1][1] > FINISH_I - 25) bridges.pop();
    }
    let tries = 0;
    while (ramps.length < 5 && tries++ < 80){
      const i = Math.floor(START_I + 30 + r() * (FINISH_I - START_I - 70));
      if (bridges.some(([a, b]) => i > a - 8 && i < b + 8)) continue;
      if (ramps.some(r0 => Math.abs(r0.i - i) < 25)) continue;
      ramps.push({ i, side: r() < 0.5 ? -1 : 1 });
    }
  }
  {
    const r = mulberry32(SW[3]);
    let i = START_I + 40;
    while (i < FINISH_I - 20){
      i += 35 + Math.floor(r() * 55);
      if (i >= FINISH_I - 20) break;
      if (bridges.some(([a, b]) => i > a - 6 && i < b + 6)) continue;
      if (ramps.some(rp => Math.abs(rp.i - i) < 12)) continue;
      stones.push(i);
    }
  }

  // ===== pace notes =====
  function segAngle(i){
    const a = pts[Math.max(i - 1, 0)], b = pts[Math.min(i + 1, NPTS - 1)];
    return Math.atan2(b[1] - a[1], b[0] - a[0]);
  }
  function norm(a){ while (a > Math.PI) a -= 2 * Math.PI; while (a < -Math.PI) a += 2 * Math.PI; return a; }
  const calls = [];
  {
    // corners: accumulate heading change
    let i = START_I;
    while (i < FINISH_I - 4){
      const d0 = norm(segAngle(i + 3) - segAngle(i));
      if (Math.abs(d0) > 0.1){
        const dir = d0 > 0 ? 1 : 0; // screen-y down: positive = right for a car heading up
        let j = i, total = 0;
        while (j < FINISH_I - 3){
          const dj = norm(segAngle(j + 3) - segAngle(j));
          if (Math.abs(dj) < 0.06 || (dj > 0) !== (d0 > 0)) break;
          total += dj; j += 3;
        }
        const T = Math.abs(total);
        const side = dir ? 'RIGHT' : 'LEFT';
        let txt;
        if (T > 2.3) txt = 'HAIRPIN ' + side;
        else if (T > 1.55) txt = side + ' 1';
        else if (T > 1.1) txt = side + ' 2';
        else if (T > 0.75) txt = 'SQUARE ' + side;
        else if (T > 0.45) txt = side + ' 4';
        else if (T > 0.24) txt = side + ' 5';
        else txt = null;
        if (txt) calls.push({ i, txt });
        i = j + 2;
      } else i += 2;
    }
    for (const rp of ramps) calls.push({ i: rp.i - 4, txt: 'JUMP ' + (rp.side < 0 ? 'LEFT' : 'RIGHT') });
    for (const [a] of bridges) calls.push({ i: a - 5, txt: 'BRIDGE — CAUTION' });
    for (const si of stones) calls.push({ i: si - 4, txt: 'ROCKS' });
    // narrows
    for (let k = START_I; k < FINISH_I; k++){
      if (widths[k] < 62 && widths[k - 1] >= 62) calls.push({ i: k - 4, txt: 'NARROWS' });
    }
    calls.push({ i: FINISH_I - 14, txt: 'FLAT TO FINISH' });
    calls.sort((a, b) => a.i - b.i);
    // merge calls that are too close
    for (let k = calls.length - 2; k >= 0; k--){
      if (calls[k + 1].i - calls[k].i < 5){
        calls[k].txt += ' INTO ' + calls[k + 1].txt;
        calls.splice(k + 1, 1);
      }
    }
  }

  // ===== minimap =====
  const map = $('map'), mg = map.getContext('2d');
  let mmScale = 1, mmOx = 0, mmOy = 0;
  {
    let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
    for (const [x, y] of pts){ minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); }
    const pad = 26;
    mmScale = Math.min((340 - pad*2) / Math.max(maxX - minX, 1), (340 - pad*2) / Math.max(maxY - minY, 1));
    mmOx = pad - minX * mmScale + ((340 - pad*2) - (maxX - minX) * mmScale) / 2;
    mmOy = pad - minY * mmScale + ((340 - pad*2) - (maxY - minY) * mmScale) / 2;
  }
  function drawMap(dx, dy){
    mg.clearRect(0, 0, 340, 340);
    mg.strokeStyle = '#3f4b39'; mg.lineWidth = 8; mg.lineJoin = 'round'; mg.lineCap = 'round';
    mg.beginPath();
    pts.forEach(([x, y], i) => { const px = x*mmScale+mmOx, py = y*mmScale+mmOy; i ? mg.lineTo(px, py) : mg.moveTo(px, py); });
    mg.stroke();
    mg.font = '16px sans-serif'; mg.textAlign = 'center';
    const [fx, fy] = pts[FINISH_I];
    mg.fillText('🏁', fx*mmScale+mmOx, fy*mmScale+mmOy);
    if (dx != null){
      mg.fillStyle = '#ff8c2e';
      mg.beginPath(); mg.arc(dx*mmScale+mmOx, dy*mmScale+mmOy, 7, 0, Math.PI*2); mg.fill();
      mg.strokeStyle = '#fff'; mg.lineWidth = 2; mg.stroke();
    }
  }
  drawMap(null, null);

  // ===== live link =====
  let ws = null, drvIdx = 0, active = false;
  function coarseIdx(x, y){
    let best = 1e18, bi = 0;
    for (let i = 0; i < NPTS; i += 4){
      const dx = pts[i][0] - x, dy = pts[i][1] - y, d = dx*dx + dy*dy;
      if (d < best){ best = d; bi = i; }
    }
    return bi;
  }
  function renderCalls(){
    const upcoming = calls.filter(c => c.i > drvIdx - 3).slice(0, 3);
    if (!upcoming.length){
      $('nowTxt').textContent = 'FLAT TO FINISH';
      $('nowDist').textContent = '';
      $('callNext').innerHTML = '';
      return;
    }
    const m0 = Math.max(0, Math.round((upcoming[0].i - drvIdx) * STEP / 3.3));
    $('nowDist').textContent = m0 > 8 ? 'in ' + m0 + ' m' : 'NOW!';
    $('nowTxt').textContent = upcoming[0].txt;
    $('callNext').innerHTML = upcoming.slice(1).map(c => {
      const m = Math.round((c.i - drvIdx) * STEP / 3.3);
      return '<div class="nrow"><span>' + c.txt + '</span><span class="d">' + m + ' m</span></div>';
    }).join('');
    $('progressBar').style.width = Math.min(100, Math.max(0, (drvIdx - START_I) / (FINISH_I - START_I) * 100)) + '%';
  }
  renderCalls();

  const hashCode = location.hash.replace('#', '').toUpperCase();
  if (/^[A-Z0-9]{4}$/.test(hashCode)) $('code').value = hashCode;

  $('go').addEventListener('click', () => {
    const code = $('code').value.trim().toUpperCase();
    if (!/^[A-Z0-9]{4}$/.test(code)){ $('err').textContent = 'Enter the 4-letter crew code.'; return; }
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);
    ws.addEventListener('open', () => ws.send(JSON.stringify({ t: 'watch', code })));
    ws.addEventListener('message', (e) => {
      let m; try { m = JSON.parse(e.data); } catch { return; }
      if (m.t === 'watch_error'){ $('err').textContent = m.reason; return; }
      if (m.t === 'drv_info'){
        $('join').classList.add('hidden');
        $('notes').classList.remove('hidden');
        $('drvName').textContent = '🏎 ' + (m.n || 'DRIVER');
        $('drvStatus').textContent = 'linked — waiting for the run';
      }
      if (m.t === 'drv'){
        active = true;
        $('drvStatus').textContent = 'ON STAGE';
        drvIdx = coarseIdx(m.x, m.y);
        drawMap(m.x, m.y);
        renderCalls();
      }
      if (m.t === 'drv_end'){
        active = false;
        $('drvStatus').textContent = 'run over — waiting';
        $('nowTxt').textContent = 'STAND BY';
        $('nowDist').textContent = '';
      }
      if (m.t === 'drv_gone'){
        $('drvStatus').textContent = 'driver disconnected';
      }
    });
    ws.addEventListener('close', () => { $('drvStatus').textContent = 'connection lost — reload'; });
  });
})();
</script>
</body>
</html>
